<!DOCTYPE html>
<html>
<head>
    <title>New Habit</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page-wrapper">

    <!-- Top nav (same as dashboard) -->
    <div class="top-nav">
        <div class="logo">Habit Tracker</div>

        <div class="nav-links">
            <a href="/index.html">Dashboard</a>
            <a href="#">Habits</a>
            <a href="#" class="active">Add Habit</a>
        </div>

        <div class="profile-pill">A</div>
    </div>


    <!-- Panel like dashboard -->
    <div class="panel">

        <h2>Add New Habit</h2>

        <form>

            <label>NAME OF THE HABIT</label>
            <input type="text" placeholder="Enter habit name">


            <label>CHOOSE YOUR CATEGORY</label>
            <select>
                <option>Health</option>
                <option>Study</option>
                <option>Fitness</option>
                <option>Personal</option>
                <option>Recreational</option>
            </select>


            <label>DAYS</label>

            <div class="days">
                <label><input type="checkbox"> Mon</label>
                <label><input type="checkbox"> Tue</label>
                <label><input type="checkbox"> Wed</label>
                <label><input type="checkbox"> Thu</label>
                <label><input type="checkbox"> Fri</label>
                <label><input type="checkbox"> Sat</label>
                <label><input type="checkbox"> Sun</label>
            </div>


            <label>FREQUENCY</label>

            <select>
                <option>Once a day</option>
                <option>Twice a day</option>
                <option>Thrice a day</option>
            </select>


            <label>NOTES</label>
            <textarea placeholder="Some extra you want to add"></textarea>


            <label>TARGET</label>
            <input type="text" placeholder="Enter target">

        </form>

        <div class="buttons">
            <button class="primary-btn" a href="/index.html">Save Habit</button>
            <button class="primary-btn">Reset</button>
        </div>

    </div>

</div>

</body>
</html>
