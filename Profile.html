
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="style.css">

<style>

/* Avatar circle */

.avatar-circle{
  width:120px;
  height:120px;
  background:var(--purple);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  font-weight:800;
  border-radius:20px;
  border:3px solid var(--black);
}

/* Avatar popup */

.avatar-popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
}

.avatar-box{
  background:var(--panel-bg);
  padding:30px;
  border:3px solid var(--black);
  box-shadow:6px 6px 0 var(--black);
  width:420px;
}

.avatar-options{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.option{
  padding:10px 15px;
  border:2px solid var(--black);
  border-radius:12px;
  background:white;
  cursor:pointer;
  font-weight:700;
}

.option:hover{
  background:var(--yellow);
}

</style>

</head>


<body>

<div class="page-wrapper">

<!-- PROFILE HEADER -->

<div class="panel">

<h1 style="font-size:2.2rem; font-weight:800; margin-bottom:10px;">
Profile
</h1>

<div style="display:flex; gap:15px; flex-wrap:wrap;">
<div class="tag yellow-tag">🥇 Gold Badge</div>
<div class="tag coral-tag">🔥 Streak: 12 Days</div>
</div>

</div>


<!-- USER PROFILE -->

<div class="panel">

<h2>User Profile</h2>

<div style="display:flex; align-items:center; gap:30px; margin-top:15px; flex-wrap:wrap;">

<div class="avatar-circle">AD</div>

<div>

<p style="font-weight:700;">Username</p>
<p style="margin-bottom:10px;">Aishita</p>

<p style="font-weight:700;">Password</p>
<p style="margin-bottom:10px;">********</p>

<p style="font-weight:700;">Email</p>
<p>aishita@email.com</p>

</div>

</div>


<!-- PROFILE COMPLETION -->

<div style="margin-top:25px;">

<p style="font-weight:700; margin-bottom:6px;">Profile Completion</p>

<div class="progress-bar">
<div class="fill purple-fill" style="width:80%"></div>
</div>

<p style="margin-top:5px; font-weight:600;">80%</p>

</div>


<!-- CREATE AVATAR BUTTON -->

<div style="margin-top:20px;">
<button class="primary-btn" onclick="openAvatar()">Create Your Avatar</button>
</div>

</div>


<!-- CHANGE PASSWORD -->

<div class="panel">

<h2>Account Settings</h2>

<button class="primary-btn">
Change Password
</button>

</div>


<!-- ACCOUNT ACTIONS -->

<div class="panel">

<h2>Account Actions</h2>

<div style="display:flex; gap:15px; flex-wrap:wrap;">

<button class="primary-btn">
Logout
</button>

<button class="primary-btn" style="background:#ff3c3c;">
Delete Account
</button>

</div>

</div>

</div>


<!-- AVATAR POPUP -->

<div id="avatarPopup" class="avatar-popup">

<div class="avatar-box">

<h2>Create Your Avatar</h2>

<h3>Hair</h3>

<div class="avatar-options">
<div class="option">Short</div>
<div class="option">Long</div>
<div class="option">Curly</div>
<div class="option">Ponytail</div>
</div>

<h3>Clothes</h3>

<div class="avatar-options">
<div class="option">T-Shirt</div>
<div class="option">Hoodie</div>
<div class="option">Jacket</div>
</div>

<h3>Hats</h3>

<div class="avatar-options">
<div class="option">Cap</div>
<div class="option">Beanie</div>
<div class="option">Crown</div>
</div>

<button class="primary-btn" onclick="closeAvatar()">Done</button>

</div>

</div>


<script>

function openAvatar(){
document.getElementById("avatarPopup").style.display="flex";
}

function closeAvatar(){
document.getElementById("avatarPopup").style.display="none";
}

</script>


</body>
</html>
