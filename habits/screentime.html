<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Wellness</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background-color: var(--pink);
}
/* FIX WIDTH ISSUE */
.stats-grid {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.page-wrapper> * {
  margin: 20px 0px;
}
/* CALENDAR */
.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.calendar-grid{
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:8px;
}

.day-name{
  font-weight:800;
  text-align:center;
}

.day-box{
  background:white;
  border:2px solid var(--black);
  padding:12px;
  text-align:center;
  border-radius:10px;
  font-weight:700;
}

.done{
  background:var(--green);
  color:white;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.5);
}

.popup-box{
  background:var(--panel-bg);
  padding:20px;
  border:3px solid var(--black);
  box-shadow:6px 6px 0 var(--black);
}

input, select, textarea{
width: 100%;
}

</style>
</head>

<body>

<div class="page-wrapper">
<header class="top-nav">
      <div class="logo">Catalyst</div>

      <nav class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="my-habits.html" class="active">My Habits</a>
        <a href="#">Progress</a>
        <a href="#">Calendar</a>
        <a href="#">Settings</a>
      </nav>

      <div class="profile-pill"><a href="Profile.html">AD</a></div>
</header>
<div class="panel">
<h1>Digital Wellness Dashboard</h1>
</div>

<!-- STATS -->
<div class="stats-grid">

<div class="stat-card yellow">
<h3>Today Screen Time</h3>
<p id="todayTime">10 hrs</p>
</div>

<div class="stat-card purple">
<h3>Target</h3>
<p id="targetTime">3 hrs</p>
</div>

<div class="stat-card pink">
<h3>Status</h3>
<p id="statusText">Exceeded</p>
</div>

<div class="stat-card coral">
<h3>Streak</h3>
<p id="streak">12 days</p>
</div>

</div>

<!-- BUTTON -->
<div class="panel">
<button class="primary-btn" onclick="openPopup()">Change Target</button>
</div>

<!-- CALENDAR -->
<div class="panel">
<h2>Calendar</h2>

<div class="calendar-header">
<button onclick="prevMonth()">⬅</button>
<h3 id="monthYear"></h3>
<button onclick="nextMonth()">➡</button>
</div>

<div class="calendar-grid" id="calendar"></div>
</div>

<!-- DAILY ENTRY -->
<div class="panel">
<h2>Daily Entry</h2>

<label>Screen Time (hrs)</label>
<input type="number" id="timeInput">

<label>Main Usage</label>
<select id="usage">
<option>Study</option>
<option>Social Media</option>
<option>Entertainment</option>
<option>Other</option>
</select>

<label>Reflection</label>
<textarea id="reflection"></textarea>

<button class="primary-btn" onclick="saveDay()">Save Day</button>
</div>

<!-- GRAPH -->
<div class="panel">
<h2>Monthly Trend</h2>
<canvas id="myChart"></canvas>
</div>

</div>

<div class="popup" id="popup">
<div class="popup-box">
<h3>Set Target</h3>
<input type="number" id="newTarget">
<br><br>
<button class="primary-btn" onclick="saveTarget()">Save</button>
</div>
</div>

<script>

// TARGET
let target = 3;

// CALENDAR DATA (sample days completed)
let completedDays = [2,5,7,10,14,18,22];

// DATE
let currentDate = new Date();

// OPEN POPUP
function openPopup(){
  document.getElementById("popup").style.display="flex";
}

// SAVE TARGET
function saveTarget(){
  target = document.getElementById("newTarget").value;
  document.getElementById("targetTime").innerText = target + " hrs";
  document.getElementById("popup").style.display="none";
}

// SAVE DAY
function saveDay(){
  let time = document.getElementById("timeInput").value;

  if(time === ""){
    alert("Enter screen time");
    return;
  }

  let today = new Date().getDate();

  if(time <= target){
    completedDays.push(today);
    document.getElementById("statusText").innerText = "Good";
  } else {
    document.getElementById("statusText").innerText = "Exceeded";
  }

  document.getElementById("todayTime").innerText = time + " hrs";

  renderCalendar();
}

// CALENDAR RENDER
function renderCalendar(){

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const month = currentDate.getMonth();
  const year = currentDate.getFullYear();

  document.getElementById("monthYear").innerText =
    currentDate.toLocaleString("default",{month:"long"}) + " " + year;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();

  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // day names
  days.forEach(d=>{
    let div = document.createElement("div");
    div.className="day-name";
    div.innerText=d;
    cal.appendChild(div);
  });

  // empty spaces
  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement("div"));
  }

  // dates
  for(let i=1;i<=lastDate;i++){
    let box = document.createElement("div");
    box.classList.add("day-box");
    box.innerText = i;

    if(completedDays.includes(i)){
      box.classList.add("done");
    }

    cal.appendChild(box);
  }
}

// MONTH NAV
function prevMonth(){
  currentDate.setMonth(currentDate.getMonth()-1);
  renderCalendar();
}

function nextMonth(){
  currentDate.setMonth(currentDate.getMonth()+1);
  renderCalendar();
}

renderCalendar();


// LINE GRAPH (LIKE YOUR IMAGE)
const ctx = document.getElementById('myChart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Week 1','Week 2','Week 3','Week 4'],
    datasets: [{
      label: 'Screen Time Trend',
      data: [5, 4, 6, 3],
      tension: 0.4
    }]
  }
});

</script>

</body>
</html>
