<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Habit Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Specific styles for the Login layout */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }

    .login-panel {
      background: var(--panel-bg);
      border: 4px solid var(--black);
      padding: 40px;
      box-shadow: 10px 10px 0 var(--black);
      text-align: center;
    }

    .login-panel h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .subtitle {
      font-weight: 600;
      margin-bottom: 30px;
      display: block;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 800;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .form-group input {
      width: 100%;
      padding: 14px;
      border: 3px solid var(--black);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      outline: none;
    }

    .form-group input:focus {
      background: var(--bg-main);
      box-shadow: 4px 4px 0 var(--black);
    }

    .login-btn {
      width: 100%;
      background: var(--purple);
      color: var(--white);
      border: 3px solid var(--black);
      padding: 16px;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 6px 6px 0 var(--black);
      transition: transform 0.1s;
      margin-top: 10px;
    }

    .login-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0 var(--black);
    }

    .footer-links {
      margin-top: 25px;
      font-weight: 700;
    }

    .footer-links a {
      color: var(--black);
      text-decoration: underline;
      text-decoration-thickness: 2px;
    }

    .footer-links a:hover {
      color: var(--coral);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-panel">
      <h1>Welcome Back!</h1>
      <span class="subtitle">Ready to crush your goals?</span>

      <form action="index.html">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="hello@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="login-btn">Log In →</button>
      </form>

      <div class="footer-links">
        <p>New here? <a href="#">Create an account</a></p>
      </div>
    </div>
  </div>

</body>
</html>
